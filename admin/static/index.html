<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOMO Trading Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: { 800: '#1a1b2e', 900: '#0f1021', 700: '#252744' },
            accent: { blue: '#60a5fa', green: '#34d399', red: '#f87171', yellow: '#fbbf24', purple: '#a78bfa' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
    .chat-bubble { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .detail-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
    .detail-content.open { max-height: 2000px; overflow-y: auto; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1b2e; }
    ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 3px; }
    .confidence-bar { transition: width 0.5s ease-out; }
    .status-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* LLM Conversation */
    .llm-conversation { display: flex; flex-direction: column; gap: 8px; }
    .llm-model-tag { display: inline-block; background: #1e293b; color: #94a3b8; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-bottom: 4px; }
    .llm-msg { border-left: 3px solid; padding: 6px 10px; border-radius: 4px; }
    .llm-system { border-color: #a78bfa; background: rgba(167,139,250,0.06); }
    .llm-user { border-color: #60a5fa; background: rgba(96,165,250,0.06); }
    .llm-assistant { border-color: #34d399; background: rgba(52,211,153,0.06); }
    .llm-role { font-size: 10px; font-weight: 600; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .llm-system .llm-role { color: #a78bfa; }
    .llm-user .llm-role { color: #60a5fa; }
    .llm-assistant .llm-role { color: #34d399; }
    .llm-body { white-space: pre-wrap; word-break: break-all; color: #d1d5db; line-height: 1.5; max-height: 300px; overflow-y: auto; }

    /* Progress spinner for in-progress activities */
    .progress-spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #4b5563; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Stock group card */
    .stock-card { border: 1px solid #374151; border-radius: 10px; margin: 4px 0; overflow: hidden; animation: fadeIn 0.3s ease-out; }
    .stock-card.outcome-buy { border-left: 3px solid #f87171; }
    .stock-card.outcome-sell { border-left: 3px solid #60a5fa; }
    .stock-card.outcome-hold { border-left: 3px solid #6b7280; }
    .stock-card.outcome-error { border-left: 3px solid #fbbf24; }
    .stock-card.outcome-progress { border-left: 3px solid #a78bfa; }
    .stock-card-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .stock-card-header:hover { background: rgba(255,255,255,0.03); }
    .stock-card-body { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
    .stock-card-body.open { max-height: 3000px; overflow-y: auto; }
    .stock-card-steps { padding: 0 12px 8px 12px; }
    .stock-step { display: flex; align-items: flex-start; gap: 8px; padding: 4px 0; border-top: 1px solid #1f2937; }
    .stock-step:first-child { border-top: none; }

    /* Cycle divider */
    .cycle-divider { display: flex; align-items: center; gap: 8px; padding: 6px 12px; margin: 8px 0 4px 0; color: #6b7280; font-size: 12px; }
    .cycle-divider::before, .cycle-divider::after { content: ''; flex: 1; height: 1px; background: #374151; }
  </style>
</head>
<body class="dark bg-dark-900 text-gray-200 h-screen flex flex-col overflow-hidden">
  <!-- Header -->
  <header class="bg-dark-800 border-b border-gray-700 px-4 py-2 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <h1 class="text-lg font-bold text-white">MOMO Trading Admin</h1>
      <span id="version" class="text-xs text-gray-500">v0.1.0</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span id="badge-trading" class="px-2 py-0.5 rounded text-xs font-medium"></span>
      <span id="badge-mode" class="px-2 py-0.5 rounded bg-purple-900/50 text-purple-300 text-xs"></span>
      <span id="badge-mcp" class="px-2 py-0.5 rounded text-xs"></span>
      <span id="badge-sse" class="px-2 py-0.5 rounded text-xs"></span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Left Sidebar -->
    <aside class="w-64 bg-dark-800 border-r border-gray-700 flex flex-col shrink-0">
      <!-- Navigation -->
      <nav class="p-3 space-y-1">
        <button onclick="switchView('live')" id="nav-live" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm font-medium bg-blue-900/30 text-blue-300">
          &#x1f4e1; &#xc2e4;&#xc2dc;&#xac04; &#xbaa8;&#xb2c8;&#xd130;&#xb9c1;
        </button>
        <button onclick="switchView('today')" id="nav-today" class="nav-btn w-full text-left px-3 py-2 rounded-lg text-sm text-gray-400 hover:bg-dark-700">
          &#x1f4cb; &#xc624;&#xb298; &#xb9ac;&#xd3ec;&#xd2b8;
        </button>
        <div class="pt-2">
          <div class="text-xs text-gray-500 px-3 mb-1">&#xacfc;&#xac70; &#xb9ac;&#xd3ec;&#xd2b8;</div>
          <div id="report-list" class="space-y-0.5 max-h-32 overflow-y-auto"></div>
        </div>
      </nav>

      <div class="border-t border-gray-700 my-2"></div>

      <!-- Account Info -->
      <div class="p-3 space-y-2 flex-1 overflow-y-auto">
        <div class="text-xs text-gray-500 font-medium">계좌 잔고</div>
        <div id="account-info" class="text-xs space-y-1">
          <div class="text-gray-600">로딩 중...</div>
        </div>

        <!-- 보유종목 -->
        <div id="holdings-section">
          <div id="holdings-header" class="flex items-center justify-between mt-3 mb-1">
            <span class="text-xs text-green-400 font-medium">보유종목</span>
            <span id="holdings-count" class="text-xs text-gray-600">0종목</span>
          </div>
          <div id="holdings-info" class="text-xs space-y-1 max-h-60 overflow-y-auto"></div>
        </div>

        <!-- 미체결 주문 -->
        <div id="pending-section">
          <div id="pending-header" class="flex items-center justify-between mt-3 mb-1">
            <span class="text-xs text-yellow-400 font-medium">미체결 주문</span>
            <span id="pending-count" class="text-xs text-gray-600">0건</span>
          </div>
          <div id="pending-orders-info" class="text-xs space-y-1 max-h-40 overflow-y-auto"></div>
        </div>
      </div>

      <div class="border-t border-gray-700 my-2"></div>

      <!-- Settings (접이식) -->
      <div class="p-3 shrink-0">
        <button onclick="toggleSettings()" class="flex items-center justify-between w-full text-xs text-gray-500 font-medium hover:text-gray-300 transition">
          <span>설정</span>
          <span id="settings-arrow" class="transition-transform" style="transform:rotate(-90deg)">&#x25BC;</span>
        </button>
        <div id="settings-body" class="space-y-3 mt-2 hidden">
          <label class="flex items-center justify-between">
            <span class="text-sm">매매 활성화</span>
            <input type="checkbox" id="set-trading" onchange="updateSetting('TRADING_ENABLED', this.checked)"
              class="w-9 h-5 rounded-full appearance-none bg-gray-600 checked:bg-green-500 relative cursor-pointer
              after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:w-4 after:h-4 after:rounded-full after:bg-white after:transition-transform checked:after:translate-x-4">
          </label>

          <div>
            <label class="text-sm block mb-1">모드</label>
            <select id="set-mode" onchange="updateSetting('AUTONOMY_MODE', this.value)"
              class="w-full bg-dark-700 border border-gray-600 rounded px-2 py-1.5 text-sm">
              <option value="SEMI_AUTO">SEMI_AUTO</option>
              <option value="AUTONOMOUS">AUTONOMOUS</option>
            </select>
          </div>

          <div>
            <label class="text-sm block mb-1">리스크 성향</label>
            <select id="set-risk-appetite" onchange="updateSetting('RISK_APPETITE', this.value)"
              class="w-full bg-dark-700 border border-gray-600 rounded px-2 py-1.5 text-sm">
              <option value="CONSERVATIVE">보수적 (CONSERVATIVE)</option>
              <option value="MODERATE">중립 (MODERATE)</option>
              <option value="AGGRESSIVE">공격적 (AGGRESSIVE)</option>
            </select>
          </div>

          <div class="border-t border-gray-700 pt-2">
            <div class="text-xs text-gray-500 font-medium mb-1">LLM</div>
            <div class="text-xs text-gray-400">Claude Code (로컬 CLI)</div>
            <div id="llm-tier1-model" class="text-xs text-gray-500 mt-0.5 truncate"></div>
          </div>
        </div>
      </div>

      <div class="border-t border-gray-700 my-2"></div>

      <!-- System Status & Actions -->
      <div class="p-3 space-y-2 shrink-0">
        <div class="text-xs text-gray-500 font-medium">&#xc2dc;&#xc2a4;&#xd15c;</div>
        <div id="sys-status" class="text-xs space-y-1"></div>
        <button onclick="triggerCycle()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg py-2 transition">
          &#x25b6;&#xfe0f; &#xc218;&#xb3d9; &#xc0ac;&#xc774;&#xd074; &#xc2e4;&#xd589;
        </button>
        <button onclick="generateReport()"
          class="w-full bg-gray-700 hover:bg-gray-600 text-gray-200 text-sm rounded-lg py-1.5 transition">
          &#x1f4cb; &#xb9ac;&#xd3ec;&#xd2b8; &#xc0dd;&#xc131;
        </button>
      </div>
    </aside>

    <!-- Chat Area -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <!-- Chat messages -->
      <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-2">
        <div class="text-center text-gray-500 text-sm py-8">
          &#xc5f0;&#xacb0; &#xc911;...
        </div>
      </div>

      <!-- Bottom bar -->
      <div class="bg-dark-800 border-t border-gray-700 px-4 py-2 flex items-center justify-between text-xs text-gray-500 shrink-0">
        <span id="status-text">&#xc5f0;&#xacb0; &#xb300;&#xae30;</span>
        <div class="flex items-center gap-3">
          <span id="activity-count">0&#xac74;</span>
          <button onclick="clearChat()" title="&#xd654;&#xba74; &#xbe44;&#xc6b0;&#xae30; (DB &#xc720;&#xc9c0;)"
            class="text-gray-500 hover:text-gray-300 transition">&#x1f5d1; &#xd074;&#xb9ac;&#xc5b4;</button>
          <button onclick="loadTodayActivities()" title="&#xc624;&#xb298; &#xd65c;&#xb3d9; &#xb2e4;&#xc2dc; &#xbd88;&#xb7ec;&#xc624;&#xae30;"
            class="text-gray-500 hover:text-gray-300 transition">&#x1f504; &#xc0c8;&#xb85c;&#xace0;&#xce68;</button>
        </div>
      </div>
    </main>

    <!-- Right Sidebar: LLM Usage -->
    <aside class="w-64 bg-dark-800 border-l border-gray-700 flex flex-col shrink-0 overflow-y-auto">
      <div class="p-3 space-y-3">
        <div class="text-xs text-gray-500 font-medium">Claude Code Usage</div>

        <!-- Summary -->
        <div id="usage-summary" class="space-y-2">
          <div class="text-gray-600 text-xs">로딩 중...</div>
        </div>

        <!-- App (trading) usage -->
        <div class="border-t border-gray-700 pt-2">
          <div class="text-xs text-gray-500 font-medium mb-1">Trading App 사용량</div>
          <div id="usage-app" class="text-xs space-y-1"></div>
        </div>

        <!-- Subscription model usage -->
        <div class="border-t border-gray-700 pt-2">
          <div class="text-xs text-gray-500 font-medium mb-1">구독 누적 사용량</div>
          <div id="usage-models" class="text-xs space-y-1"></div>
        </div>

        <!-- Daily chart (last 7 days) -->
        <div class="border-t border-gray-700 pt-2">
          <div class="text-xs text-gray-500 font-medium mb-1">일별 토큰 추이</div>
          <div id="usage-chart" class="space-y-1"></div>
        </div>
      </div>
    </aside>
  </div>

  <script src="/admin/static/js/app.js"></script>
</body>
</html>
