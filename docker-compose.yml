services:
  kis-mcp:
    build:
      context: ./docker/kis-mcp
      dockerfile: Dockerfile
    container_name: kis-mcp-server
    ports:
      - "3100:3000"
    environment:
      - KIS_APP_KEY=${KIS_APP_KEY}
      - KIS_APP_SECRET=${KIS_APP_SECRET}
      - KIS_PAPER_APP_KEY=${KIS_PAPER_APP_KEY}
      - KIS_PAPER_APP_SECRET=${KIS_PAPER_APP_SECRET}
      - KIS_CANO=${KIS_ACCT_STOCK}
      - KIS_PAPER_CANO=${KIS_PAPER_STOCK}
      - KIS_ACCOUNT_TYPE=${KIS_ACCOUNT_TYPE:-VIRTUAL}
      - KIS_TOKEN_DIR=/app/data
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 2 http://localhost:3000/sse || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
